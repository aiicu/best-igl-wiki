<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best IGL Wiki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }
        
        .sidebar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        
        .sidebar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
        
        .sidebar::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        
        .content-area::-webkit-scrollbar {
            width: 8px;
        }
        
        .content-area::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        
        .content-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        
        .content-area::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        .tag-red { background: #fee2e2; color: #dc2626; }
        .tag-green { background: #dcfce7; color: #16a34a; }
        .tag-blue { background: #dbeafe; color: #2563eb; }
        .tag-yellow { background: #fef3c7; color: #d97706; }
        .tag-purple { background: #f3e8ff; color: #9333ea; }
        .tag-gray { background: #f3f4f6; color: #6b7280; }
        
        .event-card {
            transition: all 0.2s ease;
        }
        
        .event-card:hover {
            transform: translateX(4px);
        }
        
        .event-card.active {
            background: linear-gradient(90deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }
        
        .event-card.active .event-date {
            color: rgba(255,255,255,0.8);
        }
        
        .highlight-red { color: #dc2626; font-weight: 600; }
        .highlight-green { color: #16a34a; font-weight: 600; }
        .highlight-blue { color: #2563eb; font-weight: 600; }
        
        .markdown-body {
            background: transparent;
        }
        
        .markdown-body h1 {
            font-size: 2em;
            border-bottom: 3px solid #e5e7eb;
            padding-bottom: 0.3em;
            margin-bottom: 0.8em;
        }
        
        .markdown-body h2 {
            font-size: 1.5em;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 0.2em;
            margin-top: 1.5em;
            margin-bottom: 0.6em;
        }
        
        .markdown-body h3 {
            font-size: 1.25em;
            margin-top: 1.2em;
            margin-bottom: 0.5em;
        }
        
        .markdown-body h4 {
            font-size: 1.1em;
            margin-top: 1em;
            margin-bottom: 0.4em;
        }
        
        .markdown-body blockquote {
            border-left: 4px solid #3b82f6;
            padding-left: 1em;
            color: #4b5563;
            background: #f8fafc;
            padding: 1em;
            border-radius: 0 8px 8px 0;
        }
        
        .markdown-body img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin: 1em 0;
            cursor: zoom-in;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .markdown-body img:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 12px -1px rgba(0, 0, 0, 0.15);
        }
        
        .markdown-body hr {
            border: none;
            border-top: 2px dashed #e5e7eb;
            margin: 2em 0;
        }
        
        .markdown-body a {
            color: #2563eb;
            text-decoration: none;
        }
        
        .markdown-body a:hover {
            text-decoration: underline;
        }
        
        .markdown-body ul, .markdown-body ol {
            padding-left: 2em;
            margin: 0.5em 0;
        }
        
        .markdown-body li {
            margin: 0.05em 0;
            line-height: 1.4;
        }
        
        .markdown-body code {
            background: #f3f4f6;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        
        .markdown-body pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1em;
            border-radius: 8px;
            overflow-x: auto;
        }
        
        .markdown-body ul {
            list-style-type: disc;
            padding-left: 2em;
            margin: 0.5em 0;
        }
        
        .markdown-body ol {
            list-style-type: decimal;
            padding-left: 2em;
            margin: 0.5em 0;
        }
        
        .markdown-body ul li, .markdown-body ol li {
            display: list-item;
            margin: 0.05em 0;
            line-height: 1.4;
        }
        
        .markdown-body img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin: 1em 0;
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .timeline-line {
            position: absolute;
            left: 1.25rem;
            top: 2.5rem;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #3b82f6, #8b5cf6);
        }

        #contentShell {
            width: 100%;
            max-width: 56rem;
            transition: max-width 0.2s ease;
        }

        #contentShell.table-view {
            max-width: 96rem;
        }

        #xlsxMainContent {
            min-width: 0;
        }

        #xlsxMainTableContainer {
            width: 100%;
            max-width: 100%;
            scrollbar-gutter: stable;
        }

        #xlsxMainTableContainer table {
            width: max-content !important;
            min-width: 100%;
            max-width: none;
        }

        #xlsxMainTableContainer table.tiger-song-table {
            width: 100% !important;
            min-width: 60rem;
        }

        .tiger-song-cover {
            width: 7rem;
            aspect-ratio: 16 / 9;
        }

        .tiger-song-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (min-width: 1024px) {
            #contentShell.table-view #xlsxMainContent {
                padding-left: 0;
                padding-right: 0;
            }
        }
        
        @media (max-width: 1023px) {
            .markdown-body {
                font-size: 0.95rem;
            }
            
            .markdown-body p {
                line-height: 1.7;
            }
            
            #xlsxMainTableContainer {
                max-width: 100vw !important;
                margin-left: -1rem;
                margin-right: -1rem;
            }
            
            #xlsxMainTableContainer table {
                font-size: 0.75rem;
            }
            
            #xlsxMainTableContainer th,
            #xlsxMainTableContainer td {
                padding: 0.25rem 0.5rem;
                white-space: nowrap;
            }
        }
        
        @media (max-width: 640px) {
            .markdown-body {
                font-size: 0.9rem;
            }

            .tiger-song-cover {
                width: 6rem;
            }
            
            #prevBtn, #nextBtn {
                padding: 0.375rem 0.75rem;
                font-size: 0.75rem;
            }
            
            #xlsxMainTableContainer table {
                font-size: 0.7rem;
            }
            
            #xlsxMainTableContainer th,
            #xlsxMainTableContainer td {
                padding: 0.2rem 0.4rem;
            }
        }

        :root {
            --canvas: #f5f7f8;
            --surface: #ffffff;
            --surface-soft: #f7f9fa;
            --surface-strong: #eef2f3;
            --ink: #17191c;
            --body: #3f454c;
            --muted: #737b84;
            --hairline: #dde2e5;
            --hairline-soft: #e9edef;
            --accent: #008c72;
            --accent-soft: #e4f5f0;
            --accent-strong: #006c59;
            --gold: #b7791f;
            --gold-soft: #fff4d6;
            --link: #246bce;
            --danger: #b94343;
            --sidebar-width: 18rem;
        }

        * {
            box-sizing: border-box;
            letter-spacing: 0 !important;
        }

        html,
        body {
            background: var(--canvas);
            color: var(--ink);
        }

        body {
            font-family: Inter, 'Noto Sans SC', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        button,
        input,
        a {
            -webkit-tap-highlight-color: transparent;
        }

        button:focus-visible,
        a:focus-visible,
        input:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .app-sidebar {
            width: var(--sidebar-width);
            background: #f8faf9 !important;
            color: var(--ink) !important;
            border-right: 1px solid var(--hairline);
            box-shadow: none !important;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.25rem 1.25rem 1rem;
            border-bottom: 1px solid var(--hairline-soft);
        }

        .brand-mark {
            display: grid;
            width: 2.25rem;
            height: 2.25rem;
            flex: 0 0 2.25rem;
            place-items: center;
            font-size: 1.65rem;
            line-height: 1;
        }

        .brand-title {
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.25;
        }

        .brand-subtitle {
            margin-top: 0.15rem;
            color: var(--muted);
            font-size: 0.72rem;
            line-height: 1.35;
        }

        .sidebar-search {
            padding: 0.875rem 1rem;
            border-bottom: 1px solid var(--hairline-soft);
        }

        #searchInput {
            height: 2.5rem;
            border: 1px solid var(--hairline) !important;
            border-radius: 6px !important;
            background: var(--surface) !important;
            color: var(--ink) !important;
            font-size: 0.82rem;
            box-shadow: none !important;
        }

        #searchInput::placeholder {
            color: #9aa1a8 !important;
        }

        #searchInput:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(0, 140, 114, 0.1) !important;
        }

        .sidebar-filter {
            padding: 0.75rem 1rem 0.875rem;
            border-bottom: 1px solid var(--hairline-soft);
        }

        .sidebar-label {
            margin-bottom: 0.55rem;
            color: var(--muted);
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        #tagFilters {
            gap: 0.35rem !important;
        }

        .tag-filter {
            min-height: 1.75rem;
            border: 1px solid transparent !important;
            border-radius: 999px !important;
            background: var(--surface-strong) !important;
            color: #596169 !important;
            padding: 0.25rem 0.55rem !important;
            font-size: 0.68rem !important;
            font-weight: 500;
            transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
        }

        .tag-filter:hover {
            border-color: #c8d1d4 !important;
            background: #fff !important;
            color: var(--ink) !important;
        }

        .tag-filter.active {
            border-color: #b9dfd5 !important;
            background: var(--accent-soft) !important;
            color: var(--accent-strong) !important;
            font-weight: 600;
        }

        #eventList {
            padding: 0.75rem 0.75rem 1.25rem !important;
        }

        .year-section {
            margin-bottom: 1.1rem;
        }

        .year-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0 0.45rem 0.4rem;
            color: #8a9299;
            font-size: 0.68rem;
            font-weight: 700;
        }

        .year-count {
            color: #a4abb1;
            font-weight: 500;
        }

        .event-card {
            position: relative;
            display: block;
            width: 100%;
            margin: 0 0 0.2rem;
            border: 0;
            border-radius: 6px !important;
            background: transparent !important;
            color: var(--body) !important;
            padding: 0.58rem 0.65rem 0.58rem 1.1rem !important;
            text-align: left;
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        .event-card::before {
            position: absolute;
            top: 0.65rem;
            bottom: 0.65rem;
            left: 0.35rem;
            width: 2px;
            border-radius: 2px;
            background: transparent;
            content: '';
        }

        .event-card:hover {
            transform: none !important;
            background: #eef2f1 !important;
            color: var(--ink) !important;
        }

        .event-card.active {
            background: var(--accent-soft) !important;
            color: var(--accent-strong) !important;
        }

        .event-card.active::before {
            background: var(--accent);
        }

        .event-card-title {
            overflow: hidden;
            font-size: 0.78rem;
            font-weight: 500;
            line-height: 1.45;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .event-date {
            margin-top: 0.18rem !important;
            color: #90979e !important;
            font-size: 0.65rem !important;
        }

        .event-card.active .event-date {
            color: #4d8377 !important;
        }

        .sidebar-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding: 0.8rem 1rem;
            border-top: 1px solid var(--hairline-soft);
            color: var(--muted);
            font-size: 0.68rem;
        }

        .sidebar-footer a {
            color: inherit;
        }

        .sidebar-footer a:hover {
            color: var(--accent-strong);
        }

        .sidebar::-webkit-scrollbar,
        .content-area::-webkit-scrollbar,
        #xlsxMainTableContainer::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .sidebar::-webkit-scrollbar-track,
        .content-area::-webkit-scrollbar-track,
        #xlsxMainTableContainer::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb,
        .content-area::-webkit-scrollbar-thumb,
        #xlsxMainTableContainer::-webkit-scrollbar-thumb {
            border: 2px solid transparent;
            border-radius: 8px;
            background: #c8ced2;
            background-clip: padding-box;
        }

        .app-header {
            min-height: 3.75rem;
            border-bottom: 1px solid var(--hairline) !important;
            background: rgba(255, 255, 255, 0.96) !important;
            padding: 0.65rem 1.25rem !important;
        }

        #breadcrumb {
            min-width: 0;
            overflow: hidden;
            color: var(--muted) !important;
            font-size: 0.76rem !important;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #breadcrumb .font-medium,
        #breadcrumb .text-gray-800 {
            color: var(--ink) !important;
        }

        .header-icon-button {
            display: inline-grid;
            width: 2.25rem;
            height: 2.25rem;
            place-items: center;
            border: 1px solid var(--hairline);
            border-radius: 6px;
            background: var(--surface);
            color: #555d65;
            transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
        }

        .header-icon-button:hover {
            border-color: #bdc6ca;
            background: var(--surface-soft);
            color: var(--ink);
        }

        .header-icon-button:disabled {
            cursor: not-allowed;
            opacity: 0.35;
        }

        #contentArea {
            background: var(--canvas) !important;
        }

        #contentShell {
            max-width: 64rem;
            padding: 1.5rem !important;
            transition: max-width 0.2s ease;
        }

        #contentShell.table-view {
            max-width: 96rem;
        }

        .archive-home {
            padding: 0 !important;
            text-align: left !important;
        }

        .archive-hero {
            position: relative;
            min-height: 24rem;
            overflow: hidden;
            border-radius: 8px;
            background: #15191a;
            color: #fff;
        }

        .archive-hero-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 38%;
            filter: saturate(0.82) contrast(1.04);
        }

        .archive-hero-overlay {
            position: absolute;
            inset: 0;
            background: rgba(9, 13, 14, 0.62);
        }

        .archive-hero-content {
            position: relative;
            z-index: 1;
            display: flex;
            min-height: 24rem;
            max-width: 44rem;
            flex-direction: column;
            justify-content: flex-end;
            padding: 2.5rem;
        }

        .archive-kicker {
            display: inline-flex;
            width: fit-content;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.9rem;
            color: #9ce4d2;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .archive-kicker::before {
            width: 1.5rem;
            height: 2px;
            background: #32c6a4;
            content: '';
        }

        .archive-hero h1 {
            max-width: 38rem;
            margin: 0;
            color: #fff;
            font-size: 2.85rem;
            font-weight: 700;
            line-height: 1.08;
        }

        .archive-hero-copy {
            max-width: 34rem;
            margin: 1rem 0 0;
            color: rgba(255, 255, 255, 0.78);
            font-size: 0.98rem;
            line-height: 1.75;
        }

        .archive-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.65rem;
            margin-top: 1.5rem;
        }

        .primary-action,
        .secondary-action {
            display: inline-flex;
            min-height: 2.65rem;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border-radius: 6px;
            padding: 0.65rem 0.95rem;
            font-size: 0.8rem;
            font-weight: 600;
            transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
        }

        .primary-action {
            border: 1px solid #1ca486;
            background: #10a184;
            color: #fff;
        }

        .primary-action:hover {
            border-color: #07826b;
            background: #078b72;
        }

        .secondary-action {
            border: 1px solid rgba(255, 255, 255, 0.38);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .secondary-action:hover {
            border-color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.18);
        }

        .archive-section {
            padding: 2rem 0 0;
        }

        .archive-section-header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--hairline);
        }

        .archive-section-title {
            margin: 0;
            color: var(--ink);
            font-size: 1.05rem;
            font-weight: 700;
        }

        .archive-section-meta {
            color: var(--muted);
            font-size: 0.7rem;
        }

        .home-event-list {
            display: grid;
        }

        .home-event-item {
            display: grid;
            grid-template-columns: 6.5rem minmax(0, 1fr) 2rem;
            gap: 1rem;
            align-items: center;
            width: 100%;
            border: 0;
            border-bottom: 1px solid var(--hairline-soft);
            background: transparent;
            padding: 1rem 0;
            color: var(--ink);
            text-align: left;
            transition: background-color 0.15s ease;
        }

        .home-event-item:hover {
            background: rgba(255, 255, 255, 0.65);
        }

        .home-event-date {
            color: var(--muted);
            font-size: 0.72rem;
            font-variant-numeric: tabular-nums;
        }

        .home-event-title {
            margin: 0;
            font-size: 0.91rem;
            font-weight: 650;
            line-height: 1.45;
        }

        .home-event-abstract {
            display: -webkit-box;
            overflow: hidden;
            margin-top: 0.25rem;
            color: var(--muted);
            font-size: 0.75rem;
            line-height: 1.55;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 1;
        }

        .home-event-arrow {
            color: #99a1a8;
        }

        #eventContentCard {
            overflow: visible !important;
            border: 0 !important;
            border-radius: 0 !important;
            background: transparent !important;
            box-shadow: none !important;
        }

        .event-hero {
            border-bottom: 1px solid var(--hairline);
            background: transparent !important;
            color: var(--ink) !important;
            padding: 1.5rem 0 1.35rem !important;
        }

        .event-meta {
            margin-bottom: 0.65rem !important;
            color: var(--accent-strong) !important;
            font-size: 0.72rem !important;
            font-weight: 650;
            font-variant-numeric: tabular-nums;
        }

        #eventTitle {
            max-width: 46rem;
            color: var(--ink) !important;
            font-size: 2rem !important;
            font-weight: 700 !important;
            line-height: 1.25;
        }

        #eventAbstract {
            max-width: 46rem;
            margin-top: 0.75rem !important;
            color: var(--muted) !important;
            font-size: 0.88rem !important;
            line-height: 1.75 !important;
        }

        #eventTags {
            gap: 0.4rem !important;
        }

        .event-tag,
        #eventTags > span {
            display: inline-flex;
            align-items: center;
            border: 1px solid transparent;
            border-radius: 999px !important;
            padding: 0.26rem 0.55rem !important;
            font-size: 0.67rem !important;
            font-weight: 600;
        }

        #eventPdf {
            border: 1px solid #e3b6b6 !important;
            border-radius: 6px !important;
            background: #fff6f6 !important;
            color: var(--danger) !important;
            box-shadow: none !important;
        }

        #eventPdf:hover {
            border-color: #d48787 !important;
            background: #fff !important;
        }

        #eventBody {
            padding: 1.75rem 0 2.5rem !important;
        }

        .markdown-body {
            max-width: none;
            color: var(--body) !important;
            font-family: Inter, 'Noto Sans SC', system-ui, sans-serif !important;
            font-size: 1rem;
            line-height: 1.82;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4 {
            color: var(--ink) !important;

        function renderEventList() {
            const container = document.getElementById('eventList');
            container.innerHTML = '';
            
            const filteredEvents = events.filter((event, index) => {
                const matchesSearch = searchQuery === '' || 
                    event.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    event.abstract.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    event.tags.some(tag => tag.toLowerCase().includes(searchQuery.toLowerCase()));
                
                const matchesTag = currentFilter === 'all' || event.tags.includes(currentFilter);
                
                return matchesSearch && matchesTag;
            });
            
            const grouped = filteredEvents.reduce((acc, event) => {
                if (!acc[event.year]) acc[event.year] = [];
                acc[event.year].push(event);
                return acc;
            }, {});
            
            Object.keys(grouped).sort((a, b) => b - a).forEach(year => {
                const yearSection = document.createElement('div');
                yearSection.className = 'year-section';
                
                const yearHeader = document.createElement('div');
                yearHeader.className = 'year-header';
                yearHeader.innerHTML = `
                    <span>${year}</span>
                    <span class="year-count">${grouped[year].length}</span>
                `;
                yearSection.appendChild(yearHeader);
                
                grouped[year].sort((a, b) => new Date(b.date) - new Date(a.date));
                
                grouped[year].forEach(event => {
                    const eventIndex = events.findIndex(e => e.id === event.id);
                    const card = document.createElement('button');
                    card.type = 'button';
                    card.className = `event-card${eventIndex === currentIndex ? ' active' : ''}`;
                    card.onclick = () => loadEvent(eventIndex);
                    
                    card.innerHTML = `
                        <span class="event-card-title block">${escapeHtml(event.title)}</span>
                        <span class="event-date block">${escapeHtml(event.date)}</span>
                    `;
                    
                    yearSection.appendChild(card);
                });
                
                container.appendChild(yearSection);
            });
            
            if (filteredEvents.length === 0) {
                container.innerHTML = `
                    <div class="px-3 py-8 text-center text-sm text-gray-500">
                        <p>没有匹配的事件</p>

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function cleanMarkdownInline(value) {
            return value.replace(/\*\*/g, '').trim();
        }

        function parseTigerSongTable(markdown) {
            return markdown.split('\n')
                .map(line => line.trim())
                .filter(line => line.startsWith('|') && !/^\|\s*-/.test(line))
                .map(line => line.replace(/^\|/, '').replace(/\|$/, '').split('|').map(cell => cleanMarkdownInline(cell)))
                .filter(cells => cells.length >= 4 && cells[0] !== '作品')
                .map(cells => ({
                    title: cells[0],
                    archived: cells[1],
                    author: cells[2],
                    bv: cells[3]
                }));
        }

        const tigerSongCoverFileOverrides = {
            '大斧碎🀄️口': '大斧碎中口.jpg',
            'DF地狱归来单曲《💩黏》': 'DF地狱归来单曲《史黏》.jpg'
        };

        const tigerSongScoreFiles = [
            { path: '虎歌/最终评分结果.xlsx', label: '最终评分结果.xlsx' },
            { path: '虎歌/367654152_按分数_虎歌打分_41_41.xlsx', label: '原始答卷数据.xlsx' },
            { path: '虎歌/虎歌打分-默认报告.xlsx', label: '评分分布报告.xlsx' }
        ];

        function getTigerSongCoverPath(title) {
            const fileName = tigerSongCoverFileOverrides[title] || `${title}.jpg`;
            return getEncodedPath(`虎歌/images/${fileName}`);
        }

        async function loadTigerSongScores() {
            const arrayBuffer = await fetchArrayBufferContent(tigerSongScoreFiles[0].path);
            const workbook = XLSX.read(arrayBuffer, { type: 'array' });
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const records = XLSX.utils.sheet_to_json(worksheet, { defval: null, raw: true });

            return new Map(records
                .filter(record => record['作品'])
                .map(record => [String(record['作品']).trim(), {
                    rank: Number(record['排名']),
                    voters: Number(record['打分人数']),
                    removedHigh: Number(record['去掉最高分数量']),
                    removedLow: Number(record['去掉最低分数量']),
                    validVoters: Number(record['剩余人数']),
                    score: Number(record['最终评分'])
                }]));
        }

        function renderTigerSongScoreSources(scoreError) {
            const links = tigerSongScoreFiles.map(file => `
                <a href="${getEncodedPath(file.path)}" target="_blank" rel="noopener noreferrer" class="source-link">
                    <svg class="h-3.5 w-3.5 text-emerald-700" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                        <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/>
                    </svg>
                    <span>${escapeHtml(file.label)}</span>
                </a>
            `).join('');
            const status = scoreError
                ? `<p class="mt-1 text-xs text-red-600">评分加载失败：${escapeHtml(scoreError.message)}</p>`
                : '<p class="mt-1 text-xs leading-5 text-gray-500">41 人打分，去掉 5 个最高分和 5 个最低分后，以剩余 31 人的平均分作为最终评分。</p>';

            return `
                <div class="score-source-panel">
                    <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                        <div>
                            <p class="text-sm font-semibold text-gray-900">评分数据源</p>
                            ${status}
                        </div>
                        <div class="flex flex-wrap gap-2">${links}</div>
                    </div>
                </div>
            `;
        }

        function renderTigerSongsTable(rows, scores, scoreError) {
            const bodyRows = rows.map(row => {
                const videoUrl = `https://www.bilibili.com/video/${encodeURIComponent(row.bv)}`;
                const archivedClass = row.archived === '是' ? 'border border-emerald-200 bg-emerald-50 text-emerald-800' : 'border border-gray-200 bg-gray-50 text-gray-500';
                const archivedText = row.archived === '是' ? '已补档' : '未补档';
                const coverSrc = getTigerSongCoverPath(row.title);
                const coverAlt = `${row.title}封面`;
                const score = scores.get(row.title);
                const scoreHtml = score ? `
                    <div class="flex items-baseline justify-center gap-1">
                        <span class="text-base font-bold tabular-nums text-gray-900">${score.score.toFixed(4)}</span>

                    </div>

                ` : '<span class="text-gray-400">--</span>';
                const sampleHtml = score ? `
                    <div class="font-medium tabular-nums text-gray-700">${score.voters} 人</div>
                    <div class="mt-0.5 text-[11px] text-gray-500">${score.validVoters} 人有效</div>
                ` : '<span class="text-gray-400">--</span>';
                return `
                    <tr class="align-middle">
                        <td class="text-center">
                            <button type="button" class="tiger-song-cover group relative inline-block cursor-zoom-in overflow-hidden bg-slate-100 focus:outline-none focus:ring-2 focus:ring-emerald-600 focus:ring-offset-2" data-tiger-song-cover data-cover-src="${escapeHtml(coverSrc)}" data-cover-alt="${escapeHtml(coverAlt)}" aria-label="放大查看${escapeHtml(coverAlt)}" title="点击放大封面">
                                <img src="${escapeHtml(coverSrc)}" alt="${escapeHtml(coverAlt)}" width="224" height="126" loading="lazy" class="block" onerror="this.hidden = true; this.nextElementSibling.classList.remove('hidden')">
                                <span class="hidden h-full w-full flex items-center justify-center px-2 text-xs text-gray-500">暂无封面</span>
                            </button>
                        </td>
                        <td class="text-left font-medium text-gray-800"><a href="${videoUrl}" target="_blank" rel="noopener noreferrer">${escapeHtml(row.title)}</a></td>
                        <td class="text-center">${scoreHtml}</td>
                        <td class="text-center"${score ? ` title="去掉最高分 ${score.removedHigh} 人、最低分 ${score.removedLow} 人"` : ''}>${sampleHtml}</td>
                        <td class="text-center"><span class="inline-flex rounded-full px-2 py-0.5 text-xs ${archivedClass}">${archivedText}</span></td>
                        <td class="text-left text-gray-700">${escapeHtml(row.author)}</td>
                        <td class="text-center"><a href="${videoUrl}" target="_blank" rel="noopener noreferrer" class="font-medium">${escapeHtml(row.bv)}</a></td>
                    </tr>
                `;
            }).join('');

            return `
                ${renderTigerSongScoreSources(scoreError)}
                <table class="tiger-song-table border-collapse text-xs sm:text-sm">
                    <thead>
                        <tr>
                            <th class="w-32 text-center">封面</th>

                            <th class="w-28 text-center">最终评分</th>
                            <th class="w-24 text-center">打分人数</th>
                            <th class="w-20 text-center">补档</th>
                            <th class="min-w-52 text-left">作者</th>
                            <th class="w-28 text-center">B站链接</th>
                        </tr>
                    </thead>
                    <tbody>${bodyRows}</tbody>
                </table>
            `;
        }

        async function fetchMarkdownContent(path) {
            const encodedPath = getEncodedPath(path);
            const cacheBuster = 't=' + Date.now();
            const urls = [
                encodedPath + '?' + cacheBuster,
                'https://raw.githubusercontent.com/aiicu/best-igl-wiki/main/' + encodedPath + '?' + cacheBuster
            ];
            let lastError;
            for (const url of urls) {
                try {
                    const response = await fetch(url, { cache: 'no-store' });
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    return await response.text();
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError;
        }

        async function fetchArrayBufferContent(path) {
            const encodedPath = getEncodedPath(path);
            const cacheBuster = 't=' + Date.now();
            const urls = [
                encodedPath + '?' + cacheBuster,
                'https://raw.githubusercontent.com/aiicu/best-igl-wiki/main/' + encodedPath + '?' + cacheBuster
            ];
            let lastError;
            for (const url of urls) {
                try {
                    const response = await fetch(url, { cache: 'no-store' });
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    return await response.arrayBuffer();
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError;
        }

        function getEncodedPath(path) {
            return path.replace(/\\/g, '/').split('/').map(part => encodeURIComponent(part)).join('/');
        }

        function markdownToHtml(markdown, basePath, eventTitle) {
            let html = markdown;
            
            const lines = html.split('\n');
            const filteredLines = [];
            let skipSection = false;
            let skipSectionLevel = 0;
            let firstH3Removed = false;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const trimmedLine = line.trim();
                
                if (!firstH3Removed && trimmedLine.match(/^###\s+(.+)$/)) {
                    const titleMatch = trimmedLine.match(/^###\s+(.+)$/);
                    if (titleMatch && eventTitle && titleMatch[1].trim() === eventTitle.trim()) {
                        firstH3Removed = true;
                        continue;
                    }
                }
                
                const headerMatch = trimmedLine.match(/^(#{4,5})\s+(摘要|tag)$/i);
                if (headerMatch) {
                    skipSection = true;
                    skipSectionLevel = headerMatch[1].length;
                    continue;
                }
                
                if (skipSection) {
                    const newHeaderMatch = trimmedLine.match(/^(#{2,})\s+/);
                    if (newHeaderMatch) {
                        const newLevel = newHeaderMatch[1].length;
                        if (newLevel <= skipSectionLevel) {
                            skipSection = false;
                            skipSectionLevel = 0;
                        } else {
                            continue;
                        }
                    } else if (trimmedLine.match(/^---+$/)) {
                        skipSection = false;
                        skipSectionLevel = 0;
                        continue;
                    } else {
                        continue;
                    }
                }
                
                filteredLines.push(line);
            }
            
            html = filteredLines.join('\n');
            
            html = html.replace(/^##### (.*$)/gim, '<p class="font-bold text-base my-2">$1</p>');
            html = html.replace(/^#### (.*$)/gim, '<p class="font-bold text-lg my-2">$1</p>');
            html = html.replace(/^### (.*$)/gim, '<p class="font-bold text-xl my-3">$1</p>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            
            html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            
            html = html.replace(/<font color="red">(.*?)<\/font>/g, '<span class="highlight-red">$1</span>');
            html = html.replace(/<font color="green">(.*?)<\/font>/g, '<span class="highlight-green">$1</span>');
            html = html.replace(/<font color="blue">(.*?)<\/font>/g, '<span class="highlight-blue">$1</span>');
            html = html.replace(/<font color="brone">(.*?)<\/font>/g, '<span style="color: #cd7f32;">$1</span>');
            
            html = html.replace(/<img[^>]+src="([^"]+)"[^>]*>/gi, (match, src) => {
                const altMatch = match.match(/alt="([^"]*)"/);
                const alt = altMatch ? altMatch[1] : '';
                let fullSrc;
                if (src.startsWith('http://') || src.startsWith('https://')) {
                    fullSrc = src;
                } else if (src.startsWith('/')) {
                    fullSrc = src;
                } else {
                    const cleanBase = basePath.replace(/^\//, '').replace(/\/$/, '');
                    const cleanSrc = src.replace(/\\/g, '/').replace(/^\//, '');
                    fullSrc = cleanBase + '/' + cleanSrc;
                }
                return `<img src="${fullSrc}" alt="${alt}" class="max-w-full rounded-lg shadow-md cursor-pointer hover:opacity-90 transition" onclick="openImageModal('${fullSrc}', '${alt}')" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"><div style="display:none;" class="text-red-500 text-sm mt-2">图片加载失败: ${fullSrc}</div>`;
            });
            
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, src) => {
                let fullSrc;
                if (src.startsWith('http://') || src.startsWith('https://')) {
                    fullSrc = src;
                } else if (src.startsWith('/')) {
                    fullSrc = src;
                } else {
                    const cleanBase = basePath.replace(/^\//, '').replace(/\/$/, '');
                    const cleanSrc = src.replace(/\\/g, '/').replace(/^\//, '');
                    fullSrc = cleanBase + '/' + cleanSrc;
                }
                return `<img src="${fullSrc}" alt="${alt}" class="max-w-full rounded-lg shadow-md cursor-pointer hover:opacity-90 transition" onclick="openImageModal('${fullSrc}', '${alt}')" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"><div style="display:none;" class="text-red-500 text-sm mt-2">图片加载失败: ${fullSrc}</div>`;
            });
            
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, text, src) => {
                const isVideo = src.match(/\.(flv|mp4|webm|mov|avi)$/i);
                if (isVideo) {
                    let fullSrc;
                    if (src.startsWith('http://') || src.startsWith('https://')) {
                        fullSrc = src;
                    } else if (src.startsWith('/')) {
                        fullSrc = src;
                    } else {
                        const cleanBase = basePath.replace(/^\//, '').replace(/\/$/, '');
                        const cleanSrc = src.replace(/\\/g, '/').replace(/^\//, '');
                        fullSrc = cleanBase + '/' + cleanSrc;
                    }
                    const ext = isVideo[1].toLowerCase();
                    if (ext === 'flv') {
                        return `<div class="my-4 p-4 bg-slate-100 rounded-lg"><p class="text-sm text-slate-600 mb-2">📹 本地视频文件: ${text}</p><a href="${fullSrc}" target="_blank" class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>点击下载/播放 FLV 视频</a></div>`;
                    }
                    return `<div class="my-4"><video controls class="w-full max-w-2xl rounded-lg shadow-md"><source src="${fullSrc}" type="video/${ext === 'mov' ? 'quicktime' : ext}">您的浏览器不支持视频播放。</video><p class="text-sm text-gray-500 mt-1">${text}</p></div>`;
                }
                return `<a href="${src}" target="_blank">${text}</a>`;
            });
            
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');
            
            html = html.replace(/^-{3,}$/gim, '<hr>');
            html = html.replace(/^\*{3,}$/gim, '<hr>');
            
            const listLines = html.split('\n');
            const result = [];
            let inUl = false;
            let inOl = false;
            
            for (let i = 0; i < listLines.length; i++) {
                let line = listLines[i];
                
                const ulMatch = line.match(/^\s*-\s+(.+)$/);
                const olMatch = line.match(/^\s*\d+\.\s+(.+)$/);
                
                if (ulMatch) {
                    if (!inUl) {
                        if (inOl) {
                            result.push('</ol>');
                            inOl = false;
                        }
                        result.push('<ul>');
                        inUl = true;
                    }
                    result.push(`<li>${ulMatch[1]}</li>`);
                } else if (olMatch) {
                    if (!inOl) {
                        if (inUl) {
                            result.push('</ul>');
                            inUl = false;
                        }
                        result.push('<ol>');
                        inOl = true;
                    }
                    result.push(`<li>${olMatch[1]}</li>`);
                } else {
                    if (inUl) {
                        result.push('</ul>');
                        inUl = false;
                    }
                    if (inOl) {
                        result.push('</ol>');
                        inOl = false;
                    }
                    result.push(line);
                }
            }
            
            if (inUl) result.push('</ul>');
            if (inOl) result.push('</ol>');
            
            html = result.join('\n');
            
            html = html.replace(/(?<!<\/h[1-6]>|<\/p>|<\/li>|<\/ul>|<\/ol>|<\/blockquote>|<\/pre>|<hr|<br>)\n/g, '<br>');
            
            return html;
        }

            `;
            
            try {
                const response = await fetch(file.path);
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                const html = XLSX.utils.sheet_to_html(worksheet, { editable: false });
                
                const styledHtml = html.replace('<table', '<table class="text-xs"')
                    .replace(/<td/g, '<td class="text-center"')
                    .replace(/<th/g, '<th class="font-semibold text-center"');
                
                tableContainer.innerHTML = styledHtml;
            } catch (error) {
                tableContainer.innerHTML = `<p class="text-red-500 text-sm">加载失败: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
